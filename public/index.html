<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>currency converter/Calculator</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .chart-container {
      position: relative;
      width: 100%;
      height: 250px;
      background: linear-gradient(180deg, rgba(34, 197, 94, 0.1) 0%, rgba(34, 197, 94, 0) 100%);
      border-radius: 8px;
      overflow: hidden;
    }
    .chart-line {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      fill: url(#gradient);
    }
  </style>
</head>
<body class="bg-gray-900 text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [fromCurrency, setFromCurrency] = useState('USD');
      const [toCurrency, setToCurrency] = useState('KES');
      const [fromAmount, setFromAmount] = useState('1');
      const [toAmount, setToAmount] = useState('129.47');
      const [rate, setRate] = useState(129.47);
      const [timeframe, setTimeframe] = useState('1M');
      const [lastUpdated, setLastUpdated] = useState(new Date().toLocaleString());

      const currencies = ['USD', 'EUR', 'KES', 'GBP', 'JPY', 'CHF', 'CAD', 'AUD'];

      // Generate mock chart data
      const generateChartData = () => {
        const data = [];
        const baseRate = 120;
        for (let i = 0; i < 50; i++) {
          data.push({
            x: (i / 50) * 100,
            y: baseRate + (Math.sin(i / 5) * 8) + (Math.random() * 3)
          });
        }
        return data;
      };

      const chartData = generateChartData();
      const minRate = Math.min(...chartData.map(d => d.y));
      const maxRate = Math.max(...chartData.map(d => d.y));
      const range = maxRate - minRate;

      const pathData = chartData
        .map((point, idx) => {
          const x = (point.x / 100) * 700;
          const y = 200 - ((point.y - minRate) / range) * 150;
          return `${idx === 0 ? 'M' : 'L'} ${x} ${y}`;
        })
        .join(' ');

      const handleFromAmountChange = (e) => {
        const amount = e.target.value;
        setFromAmount(amount);
        setToAmount((parseFloat(amount) * rate).toFixed(2) || '');
      };

      const handleToAmountChange = (e) => {
        const amount = e.target.value;
        setToAmount(amount);
        setFromAmount((parseFloat(amount) / rate).toFixed(2) || '');
      };

      const swapCurrencies = () => {
        setFromCurrency(toCurrency);
        setToCurrency(fromCurrency);
        const temp = fromAmount;
        setFromAmount(toAmount);
        setToAmount(temp);
        setRate(1 / rate);
      };

      return (
        <div className="min-h-screen bg-gray-900 p-6 flex items-center justify-center">
          <div className="w-full max-w-2xl">
            {/* Header with share button */}
            <div className="flex justify-between items-start mb-8">
              <div>
                <p className="text-gray-400 text-sm mb-2">1 {fromCurrency} equals</p>
                <h1 className="text-5xl md:text-6xl font-bold mb-4">
                  {toAmount} <span className="text-3xl md:text-4xl">{toCurrency}</span>
                </h1>
              </div>
              <button className="w-12 h-12 rounded-full border-2 border-gray-600 flex items-center justify-center hover:border-gray-400 transition-colors">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
              </button>
            </div>

            {/* Timestamp and source */}
            <p className="text-gray-500 text-sm mb-6">28 Mar, 19:16 UTC · From Morningstar · Disclaimer</p>

            {/* Timeframe selector */}
            <div className="flex gap-3 mb-8 overflow-x-auto pb-2">
              {['1D', '5D', '1M', '1Y', '5Y', 'Max'].map((tf) => (
                <button
                  key={tf}
                  onClick={() => setTimeframe(tf)}
                  className={`px-4 py-2 rounded-lg font-semibold text-sm transition-all whitespace-nowrap ${
                    timeframe === tf
                      ? 'bg-blue-600 text-white'
                      : 'bg-gray-800 text-gray-300 hover:bg-gray-700'
                  }`}
                >
                  {tf}
                </button>
              ))}
            </div>

            {/* Chart */}
            <div className="chart-container mb-8 border border-gray-700 rounded-lg p-4">
              <svg width="100%" height="100%" viewBox="0 0 700 200" preserveAspectRatio="xMidYMid meet">
                <defs>
                  <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style={{ stopColor: '#22c55e', stopOpacity: 0.4 }} />
                    <stop offset="100%" style={{ stopColor: '#22c55e', stopOpacity: 0 }} />
                  </linearGradient>
                </defs>
                {/* Grid lines */}
                {[130, 129, 128, 127].map((val, idx) => (
                  <g key={idx}>
                    <line x1="0" y1={30 + idx * 40} x2="700" y2={30 + idx * 40} stroke="#374151" strokeWidth="1" />
                    <text x="15" y={35 + idx * 40} fill="#9ca3af" fontSize="12">{val}</text>
                  </g>
                ))}
                {/* Chart line with fill */}
                <path d={pathData} fill="url(#gradient)" stroke="#22c55e" strokeWidth="2" />
                {/* Highlighted point */}
                {chartData[chartData.length - 1] && (
                  <>
                    <circle
                      cx={(chartData[chartData.length - 1].x / 100) * 700}
                      cy={200 - ((chartData[chartData.length - 1].y - minRate) / range) * 150}
                      r="6"
                      fill="#22c55e"
                    />
                  </>
                )}
              </svg>
            </div>

            {/* Date labels */}
            <div className="flex justify-between text-gray-500 text-xs mb-8 px-4">
              <span>6 Mar</span>
              <span>14 Mar</span>
              <span>23 Mar</span>
            </div>

            {/* Input fields */}
            <div className="space-y-3">
              <div className="bg-gray-800 rounded-lg p-4 border border-gray-700 flex items-center gap-3">
                <input
                  type="number"
                  value={fromAmount}
                  onChange={handleFromAmountChange}
                  className="bg-transparent text-2xl font-semibold w-32 outline-none"
                />
                <select
                  value={fromCurrency}
                  onChange={(e) => setFromCurrency(e.target.value)}
                  className="bg-transparent text-gray-300 cursor-pointer outline-none ml-auto"
                >
                  {currencies.map((curr) => (
                    <option key={curr} value={curr} className="bg-gray-900">
                      {curr}
                    </option>
                  ))}
                </select>
              </div>

              <button
                onClick={swapCurrencies}
                className="w-full py-2 text-gray-400 hover:text-gray-200 transition-colors"
              >
                ⇅ Swap
              </button>

              <div className="bg-gray-800 rounded-lg p-4 border border-gray-700 flex items-center gap-3">
                <input
                  type="number"
                  value={toAmount}
                  onChange={handleToAmountChange}
                  className="bg-transparent text-2xl font-semibold w-32 outline-none"
                />
                <select
                  value={toCurrency}
                  onChange={(e) => setToCurrency(e.target.value)}
                  className="bg-transparent text-gray-300 cursor-pointer outline-none ml-auto"
                >
                  {currencies.map((curr) => (
                    <option key={curr} value={curr} className="bg-gray-900">
                      {curr}
                    </option>
                  ))}
                </select>
              </div>
            </div>

            {/* Info footer */}
            <p className="text-gray-500 text-xs mt-8 text-center">
              Real-time rates by <span className="text-gray-400">OPP Forex Calculator</span>
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
